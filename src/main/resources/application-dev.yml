spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:elecciones_db}
    username: ${POSTGRES_USER:elecciones_user}
    password: ${POSTGRES_PASSWORD:SuperSecurePostgresPass2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  security:
    jwt:
      secret: ${JWT_SECRET:ChangeThisJwtSecret_Min32Chars_Dev_2026}
      access-token-minutes: 15
      refresh-token-days: 7